<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX LOGIN PAGE (CLONE)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- logo -->
<div class="navbar">
<img src="Netflix-logo.png" alt="NETFLIX Logo">
</div>

    
    <!-- login container -->

<div class="container">

    <h2>Sign In</h2>

    <form>
    <div class="input_box">
        <input type="email" placeholder="Email or password" required>
    </div>

    <div class="input_box">
        <input type="password" placeholder="password" required>
    </div>

    <button type="submit">Sign In</button>
</form>


    <div class="options">
<label for="remember">
<input type="checkbox" id="remember">
Remember me
</label>

<a href="#" >Need help?</a>
</div>

<p class="signup_text">
    New to NETFLIX?<a href="#">Sign Up now<a></p>

        <p class="container_footer">
            This page is protected by Google reCAPTCHA to <br>ensure you're not a robot.
            <a href="#">Learn more</a> 
        </p>
       


</div>


</body>
</html>
